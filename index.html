<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaAI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="mobile-topbar">
    <button onclick="toggleSidebar()">☰</button>
    <h2>VitaAI</h2>
    <button onclick="newChat()">+</button>
</div>

<div class="app">

    <aside class="sidebar" id="sidebar">
        <div class="brand">
            <h1>VitaAI</h1>
            <p>Histórico de conversas</p>
        </div>

        <button class="new-chat" onclick="newChat()">+ Nova conversa</button>

        <div id="chatList" class="chat-list"></div>

        <button class="clear" onclick="clearAllChats()">Limpar histórico</button>
    </aside>

    <main class="main">

        <section class="hero">
            <span>IA de rotina, hábitos e produtividade</span>
            <h1>VitaAI</h1>
            <p>Converse sobre foco, estudos, organização, sono, hábitos, produtividade e bem-estar.</p>
        </section>

        <section class="chat-card">

            <div class="chat-header">
                <div>
                    <h2 id="chatTitle">Nova conversa</h2>
                    <p>Resposta inteligente com contexto</p>
                </div>

                <span class="status">Online</span>
            </div>

            <div id="messages" class="messages"></div>

            <div class="input-area">
                <textarea id="question" placeholder="Digite sua pergunta..."></textarea>
                <button id="askButton" onclick="askAI()">➜</button>
            </div>

        </section>

    </main>

</div>

<script src="script.js"></script>
</body>
</html>
